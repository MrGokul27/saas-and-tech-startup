<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Stackly SaaS & Tech Startup</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome CSS CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom Style CSS -->
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
  </head>
  <body>
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard-wrapper">
      <!-- Sidebar -->
      <aside class="dash-sidebar" id="dashSidebar">
        <div class="sidebar-brand">
          <a href="../index.html">
            <div class="logo-gradient"></div>
          </a>
        </div>

        <div class="sidebar-user d-flex align-items-center gap-3">
          <div class="sidebar-avatar" id="sidebarAvatar">U</div>
          <div class="sidebar-user-info">
            <div class="user-name" id="sidebarUserName">Guest User</div>
            <span
              class="sidebar-role-badge badge-developer"
              id="sidebarUserRole"
              >Developer</span
            >
          </div>
        </div>

        <!-- Sidebar Navigation (Populated by JS) -->
        <nav class="sidebar-nav" id="sidebarNav">
          <!-- Dynmically loaded links -->
        </nav>

        <div class="sidebar-footer">
          <a href="login.html" class="nav-item" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Log Out</span>
          </a>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="dash-main">
        <!-- Topbar -->
        <header class="dash-topbar">
          <div class="topbar-left">
            <button class="sidebar-toggle-btn" id="sidebarToggle">
              <i class="fas fa-bars"></i>
            </button>
            <div class="topbar-greeting">
              Welcome back, <span id="topbarGreetingName">Guest</span>!
            </div>
          </div>
          <div class="topbar-right">
            <button class="topbar-icon-btn">
              <i class="far fa-bell"></i>
              <span class="notif-dot"></span>
            </button>
            <button class="topbar-icon-btn">
              <i class="far fa-envelope"></i>
            </button>
            <div class="topbar-user-pill" onclick="window.location.href = '#'">
              <div class="mini-avatar" id="topbarMiniAvatar">U</div>
              <span class="pill-name" id="topbarPillName">Guest</span>
            </div>
          </div>
        </header>

        <!-- Dynamic Dashboard Grid Content (Populated by JS) -->
        <div class="dash-content">
          <div class="dash-page-header">
            <h2 id="dashPageTitle">Workspace Overview</h2>
            <p id="dashPageSubtitle">
              Real-time status updates and telemetry feeds for your startup.
            </p>
          </div>

          <!-- Dynamic Stat Cards Grid -->
          <div class="row g-4 mb-4" id="statCardsGrid">
            <!-- Dynamically populated cards -->
          </div>

          <!-- Dynamic Main Cards Content -->
          <div class="row g-4" id="mainDashboardContent">
            <!-- Dynamically populated widgets -->
          </div>
        </div>
      </main>
    </div>

    <!-- Bootstrap 5 Bundle JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main Custom Script -->
    <script src="../assets/js/script.js"></script>
  </body>
</html>
