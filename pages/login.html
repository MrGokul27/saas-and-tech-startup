<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Stackly SaaS & Tech Startup</title>
    <link
      rel="icon"
      href="../assets/images/logoStackly.webp"
      type="image/webp"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- FontAwesome CSS CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom Style CSS -->
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body class="boxed_wrapper">
    <!-- preloader -->
    <div class="preloader" style="display: none"></div>

    <!-- Floating Logo in Top Left -->
    <div class="position-absolute top-0 start-0 m-4 z-3">
      <a href="../index.html">
        <div class="logo-gradient"></div>
      </a>
    </div>

    <div class="auth-page">
      <div class="auth-card">
        <!-- Back to Home Button -->
        <div class="mb-4">
          <a
            href="../index.html"
            class="theme-btn-two py-2 px-3"
            style="border-radius: 12px; font-size: 0.85rem; height: auto"
          >
            <i class="fas fa-arrow-left me-2"></i> Back to Home
          </a>
        </div>

        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Login to manage your startup workspace</p>
        </div>

        <form action="#" method="POST" class="auth-form" id="loginForm">
          <!-- Role Field -->
          <div class="form-input-group position-relative">
            <label for="loginRole">Workspace Role</label>
            <i
              class="fas fa-user-shield position-absolute"
              style="
                left: 20px;
                bottom: 18px;
                color: var(--text-muted);
                font-size: 1.1rem;
                z-index: 5;
              "
            ></i>
            <select id="loginRole" class="form-input-control" required>
              <option value="" disabled selected>
                Select your workspace role
              </option>
              <option value="developer">Developer</option>
              <option value="manager">Product Manager</option>
              <option value="admin">Systems Administrator</option>
              <option value="executive">Founder / Executive</option>
            </select>
          </div>

          <!-- Email Field -->
          <div class="form-input-group position-relative">
            <label for="loginEmail">Email Address</label>
            <i
              class="fas fa-envelope position-absolute"
              style="
                left: 20px;
                bottom: 18px;
                color: var(--text-muted);
                font-size: 1.1rem;
                z-index: 5;
              "
            ></i>
            <input
              type="email"
              id="loginEmail"
              class="form-input-control"
              placeholder="name@company.com"
              required
            />
          </div>

          <!-- Password Field -->
          <div class="form-input-group position-relative">
            <div class="d-flex justify-content-between align-items-center">
              <label for="loginPassword" class="mb-0">Password</label>
              <a href="#" class="forgot-password">Forgot?</a>
            </div>
            <i
              class="fas fa-lock position-absolute"
              style="
                left: 20px;
                bottom: 18px;
                color: var(--text-muted);
                font-size: 1.1rem;
                z-index: 5;
              "
            ></i>
            <input
              type="password"
              id="loginPassword"
              class="form-input-control mt-2"
              placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
              required
            />
            <i
              class="far fa-eye position-absolute toggle-password"
              style="
                right: 20px;
                bottom: 18px;
                cursor: pointer;
                color: var(--text-muted);
                font-size: 1.1rem;
                z-index: 5;
              "
            ></i>
          </div>

          <!-- Remember Me Action -->
          <div class="form-actions">
            <label class="remember-me-label">
              <input type="checkbox" class="remember-me-checkbox" required />
              <span>Remember me</span>
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="theme-btn auth-submit-btn">
            Sign In <i class="fas fa-sign-in-alt ms-2"></i>
          </button>
        </form>

        <div class="auth-footer">
          Don't have a workspace yet? <a href="register.html">Sign up</a>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 Bundle JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main Custom Script -->
    <script src="../assets/js/script.js"></script>
  </body>
</html>
